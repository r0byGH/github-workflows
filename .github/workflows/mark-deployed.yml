name: Mark ref as deployed

on:
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      environment:
        required: true
        type: string
      deployed_url:
        required: false
        type: string
        default: ""

permissions:
  contents: read
  deployments: write

jobs:
  mark-deployed:
    name: Current ${{ inputs.environment }} = ${{ inputs.ref }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.environment }}
      url: ${{ inputs.deployed_url }}

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Show current deployed version
        run: |
          echo "## Current ${{ inputs.environment }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Version/ref:** \`${{ inputs.ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`$(git rev-parse HEAD)\`" >> "$GITHUB_STEP_SUMMARY"
